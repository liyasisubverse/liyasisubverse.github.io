<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ලියැසි SUBVERSE - උපසිරැසි කවුළුව</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WQ65HDS0TE"></script>
    <script> window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-WQ65HDS0TE'); </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        const HEADER_BANNER_LOGO = "https://i.supaimg.com/80defc3e-b8e0-4b07-adaa-d97d791a3154/81260990-6d71-4fbb-b966-43f96215438e.png"; 
        const firebaseURL = "https://subverse-b897d-default-rtdb.firebaseio.com/"; 
    </script>
    <style>
        :root { --bg-main: #020408; --neon-cyan: #00f0ff; --neon-pink: #ff007f; --neon-amber: #ffaa00; --text-main: #ffffff; --glass-bg: rgba(6, 11, 25, 0.7); --glass-border: rgba(0, 240, 255, 0.15); }
        * { box-sizing: border-box; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; min-height: 100vh; background-image: linear-gradient(to bottom, rgba(2, 4, 8, 0.88), rgba(2, 4, 8, 0.97)), url('https://i.supaimg.com/80defc3e-b8e0-4b07-adaa-d97d791a3154/bbfcf6e6-8bca-4883-8eb1-f93a2d1d4728.png'); background-attachment: fixed; background-size: cover; background-position: center; }

        header { background: var(--glass-bg); backdrop-filter: blur(15px); border-bottom: 2px solid rgba(0, 240, 255, 0.25); padding: 10px 20px; position: sticky; top: 0; z-index: 1000; }
        .header-container { max-width: 1300px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .header-left-zone { display: flex; align-items: center; gap: 15px; }
        .three-dot-wrapper { position: relative; }
        .three-dot-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 8px 12px; }
        .dropdown-menu { display: none; position: absolute; left: 0; top: 40px; background: rgba(6, 11, 25, 0.95); border: 1px solid var(--neon-cyan); border-radius: 6px; width: 160px; z-index: 1010; }
        .dropdown-menu a { display: flex; align-items: center; gap: 8px; color: white; padding: 10px 15px; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-wrapper { display: flex; align-items: center; }
        .site-logo-img { height: 40px; }
        .live-clock { font-family: 'Courier New', monospace; font-size: 13px; font-weight: 900; color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); border: 2px solid var(--neon-cyan); padding: 6px 12px; border-radius: 6px; }

        .ticker-wrapper { background: rgba(255, 0, 127, 0.12); border-bottom: 1px solid rgba(255, 0, 127, 0.25); overflow: hidden; padding: 5px 0; }
        .ticker-text { display: inline-block; white-space: nowrap; animation: marquee 25s linear infinite; font-size: 11px; font-weight: 700; color: #fff; }
        @keyframes marquee { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .sub-nav-container { max-width: 1300px; margin: 20px auto; padding: 0 15px; text-align: center; }
        .sub-nav-bar { display: flex; justify-content: center; gap: 20px; }
        .sub-nav-item { color: #fff; text-decoration: none; font-size: 13px; font-weight: 800; padding: 8px 18px; border-radius: 5px; transition: 0.3s; }
        .sub-nav-item:hover, .sub-nav-item.active { color: var(--neon-cyan); background: rgba(0, 240, 255, 0.1); border: 1px solid rgba(0, 240, 255, 0.2); }

        .main-container { max-width: 1300px; margin: 20px auto; padding: 0 15px; }

        /* 🎀 DESKTOP & MOBILE CENTERED SINGLE COLUMN LAYOUT 👇 */
        .drama-details-container {
            display: flex; flex-direction: column; align-items: center; text-align: center; gap: 20px;
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px;
            padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin: 0 auto 30px auto;
            max-width: 900px; /* <--- ඩෙස්ක්ටොප් එකේදී පළල පාලනය කරයි */
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        /* 🎀 POSTER WITH PERFECT NO-ZOOM FIX (COVER + CENTER) 👇 */
        .detail-poster-wrapper {
            position: relative; border-radius: 12px; overflow: hidden;
            border-left: 4px solid var(--neon-cyan); border-right: 4px solid var(--neon-cyan);
            width: 300px; max-width: 100%; aspect-ratio: 2 / 3; /* <--- 2:3 අනුපාතය */
            margin: 0 auto; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }
        .detail-poster-img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }

        .details-top-badges-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; width: 100%; }
        .badge-styled { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; padding: 4px 12px; font-size: 11px; font-weight: bold; border-radius: 4px; }
        
        .genres-row-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
        .genre-tag-badge { background: rgba(157, 78, 221, 0.1); border: 1px solid #9d4edd; color: #d8b4fe; padding: 4px 12px; font-size: 11px; font-weight: 800; border-radius: 20px; }

        .rating-bar-vertical { position: absolute; right: 8px; top: 8px; background: rgba(2, 4, 8, 0.9); border-right: 3px solid var(--neon-amber); color: var(--neon-amber); padding: 4px 8px; font-size: 11px; font-weight: 900; border-radius: 3px; z-index: 2; }

        /* 📋 METADATA (CENTERED NEATLY) */
        .info-spec-list {
            list-style: none; padding: 0; margin: 0 auto 25px auto;
            display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 500px;
        }
        .info-spec-item {
            font-size: 13.5px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center; gap: 10px;
        }
        .info-spec-label { color: var(--neon-cyan); font-weight: bold; text-align: left; }
        .info-spec-value { color: #fff; font-weight: 800; text-align: right; }

        .synopsis-box { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); padding: 20px; border-radius: 10px; line-height: 1.8; color: #ccc; font-size: 13.5px; text-align: center; }

        /* 💾 EPISODES SECTION */
        .episodes-section { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 30px; margin-bottom: 30px; }
        
        .episodes-grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .movie-style-card { background: #000; border-radius: 6px; overflow: hidden; position: relative; text-decoration: none; aspect-ratio: 2 / 3; border-top: 3.5px solid var(--neon-cyan); border-bottom: 3.5px solid var(--neon-cyan); }
        .poster-img { width: 100%; height: 100%; object-fit: cover; object-position: top center; opacity: 0.8; }
        .badge-top-left { position: absolute; top: 8px; left: 8px; background: rgba(2, 4, 8, 0.85); color: #fff; padding: 3px 8px; font-size: 10px; font-weight: 900; border-radius: 4px; border: 1px solid var(--neon-cyan); z-index: 2; }
        .title-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,1) 40%, transparent); padding: 12px 6px; }
        .title-overlay p { color: var(--neon-cyan); margin: 0; font-size: 10.5px; font-weight: 800; text-align: center; }

        .episodes-grid-buttons { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .ep-btn { background: rgba(2, 4, 8, 0.6); border: 1px solid var(--neon-pink); color: var(--neon-pink); padding: 14px; border-radius: 8px; font-weight: 800; text-align: center; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 6px; }

        footer { background: rgba(4, 8, 16, 0.95); border-top: 2px solid var(--neon-cyan); padding: 40px 20px; text-align: center; margin-top: 40px; }

        @media (max-width: 600px) {
            .header-container { flex-direction: row !important; justify-content: space-between !important; align-items: center !important; }
            .live-clock { font-size: 9px !important; padding: 4px 8px !important; }
            .site-logo-img { height: 32px !important; }
            .detail-poster-wrapper { width: 250px; }
            .episodes-grid-cards { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .episodes-grid-buttons { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
            .info-spec-list { max-width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="header-left-zone">
                <div class="three-dot-wrapper">
                    <button class="three-dot-btn" onclick="toggleDropdown()"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    <div class="dropdown-menu" id="threeDotMenu">
                        <a href="index.html">Home</a>
                    </div>
                </div>
                <a href="index.html" class="logo-wrapper" id="header-logo-container"></a>
            </div>
            <div class="live-clock" id="cyberClock">🤖 [SYSTEM ACTIVE]</div>
        </div>
    </header>

    <div class="ticker-wrapper"><div class="ticker-text" id="ticker-text">⚡ Loading Subtitle Terminal...</div></div>

    <div class="sub-nav-container">
        <div class="sub-nav-bar">
            <a href="index.html" class="sub-nav-item"><i class="fa-solid fa-house"></i> Home</a>
            <a href="#" class="sub-nav-item active"><i class="fa-solid fa-film"></i> Subtitle Download</a>
        </div>
    </div>

    <div class="main-container">
        <!-- 🎀 CENTERED DRAMA DETAILS BLOCK -->
        <div class="drama-details-container" id="drama-details-wrapper">
            <p style="color: var(--neon-cyan);">🤖 [SYSTEM RETRIEVING DATA...]</p>
        </div>

        <div class="episodes-section" id="episodes-section-wrapper"></div>
    </div>

    <footer>
        <div style="color:#fff; font-size:12px;">&copy; 2026 ලියැසි SUBVERSE. All Rights Reserved.</div>
    </footer>

    <script>
        function toggleDropdown() { const m = document.getElementById('threeDotMenu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        
        const urlParams = new URLSearchParams(window.location.search);
        const dramaId = urlParams.get('id');

        async function loadDramaDetails() {
            try {
                const response = await fetch('data.json?v=' + new Date().getTime());
                if (response.ok) {
                    const db = await response.json();
                    if (db.dramas[dramaId]) renderDramaDetails(db.dramas[dramaId], db.config || {});
                    else document.getElementById('drama-details-wrapper').innerHTML = "Not Found.";
                }
            } catch (e) { document.getElementById('drama-details-wrapper').innerHTML = "Error loading data."; }
        }

        function renderDramaDetails(drama, config) {
            document.getElementById('header-logo-container').innerHTML = `<img class="site-logo-img" src="${HEADER_BANNER_LOGO}">`;
            document.title = `${drama.title} - ලියැසි SUBVERSE`;
            document.body.style.backgroundImage = `linear-gradient(to bottom, rgba(2, 4, 8, 0.9), rgba(2, 4, 8, 0.98)), url('${drama.image_url}')`;

            const isComplete = drama.status === "COMPLETE";
            const statusColor = isComplete ? "var(--neon-pink)" : "var(--neon-cyan)";

            document.getElementById('drama-details-wrapper').innerHTML = `
                <div class="details-top-badges-row">
                    <span style="background: ${statusColor}; color: #000; padding: 4px 12px; font-weight: bold; border-radius: 4px;">${drama.status}</span>
                    <span class="badge-styled">${drama.type}</span>
                    <span class="badge-styled">${drama.total_episodes || '?'} EPISODES</span>
                </div>

                <div class="detail-poster-wrapper">
                    <img class="detail-poster-img" src="${drama.image_url}" alt="Poster">
                    <div class="rating-bar-vertical"><i class="fa-solid fa-star"></i> <span>${drama.imdb}</span></div>
                </div>
                
                <div class="genres-row-container">
                    ${drama.genres ? drama.genres.map(g => `<span class="genre-tag-badge">${g}</span>`).join('') : ''}
                </div>

                <h1 style="font-size: 26px; font-weight: 900; margin: 10px 0; text-transform: uppercase;">${drama.title}</h1>
                
                <ul class="info-spec-list">
                    <li class="info-spec-item"><span class="info-spec-label">Director:</span> <span class="info-spec-value">${drama.director || 'N/A'}</span></li>
                    <li class="info-spec-item"><span class="info-spec-label">Writer:</span> <span class="info-spec-value">${drama.writer || 'N/A'}</span></li>
                    <li class="info-spec-item"><span class="info-spec-label">Network:</span> <span class="info-spec-value">${drama.network || 'N/A'}</span></li>
                    <li class="info-spec-item"><span class="info-spec-label">Country:</span> <span class="info-spec-value">${drama.country || 'N/A'}</span></li>
                    <li class="info-spec-item"><span class="info-spec-label">Air Date:</span> <span class="info-spec-value">${drama.first_air_date || 'N/A'}</span></li>
                    <li class="info-spec-item"><span class="info-spec-label">Runtime:</span> <span class="info-spec-value">${drama.runtime || 'N/A'}</span></li>
                </ul>

                <div class="synopsis-box">
                    <h3 style="color: ${statusColor}; margin: 0 0 10px 0; text-transform: uppercase;">කතා සාරාංශය (Synopsis)</h3>
                    <p style="margin: 0;">${drama.synopsis || 'කතා සාරාංශයක් ඇතුළත් කර නොමැත.'}</p>
                </div>
            `;

            const episodesWrapper = document.getElementById('episodes-section-wrapper');
            let episodesHTML = `<h2 style="font-size: 15px; color: var(--neon-amber); border-left: 3px solid var(--neon-amber); padding-left: 10px;">උපසිරැසි ලබාගන්න (Download Subtitles)</h2>`;

            const episodesMap = {};
            if (drama.episodes) {
                drama.episodes.forEach(epObj => { const m = epObj.episode.match(/\d+/); if(m) episodesMap[parseInt(m[0])] = epObj; });
            }

            const totalEpsCount = drama.total_episodes || 16;

            if (!isComplete) {
                episodesHTML += `<div class="episodes-grid-cards">`;
                for (let i = 1; i <= totalEpsCount; i++) {
                    const epData = episodesMap[i];
                    if (epData && epData.link) {
                        episodesHTML += `
                            <a href="episode_picker.html?drama_id=${drama.id}&ep=${epData.episode}" class="movie-style-card">
                                <span class="badge-top-left">${epData.episode}</span>
                                <img class="poster-img" src="${epData.image || drama.image_url}">
                                <div class="title-overlay"><p>${epData.title}</p></div>
                            </a>`;
                    } else {
                        episodesHTML += `
                            <div class="movie-style-card" style="opacity: 0.3;">
                                <span class="badge-top-left">EP ${String(i).padStart(2, '0')}</span>
                                <img class="poster-img" src="${drama.image_url}">
                                <div class="title-overlay"><p>⏳ UPCOMING</p></div>
                            </div>`;
                    }
                }
            } else {
                episodesHTML += `<div class="episodes-grid-buttons">`;
                for (let i = 1; i <= totalEpsCount; i++) {
                    const epData = episodesMap[i];
                    if (epData && epData.link) {
                        episodesHTML += `<a href="episode_picker.html?drama_id=${drama.id}&ep=${epData.episode}" class="ep-btn"><i class="fa-solid fa-circle-play"></i> <span>EPISODE ${String(i).padStart(2, '0')}</span></a>`;
                    }
                }
            }

            episodesHTML += `</div>`;
            episodesWrapper.innerHTML = episodesHTML;
        }

        window.onload = loadDramaDetails;
    </script>
</body>
</html>
