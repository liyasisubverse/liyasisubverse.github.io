<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ලියැසි SUBVERSE - උපසිරැසි බාගත කිරීමේ කවුළුව</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        const HEADER_BANNER_LOGO = "https://i.supaimg.com/80defc3e-b8e0-4b07-adaa-d97d791a3154/81260990-6d71-4fbb-b966-43f96215438e.png"; 
        const firebaseURL = "https://subverse-b897d-default-rtdb.firebaseio.com/"; 
    </script>
    <style>
        :root { --bg-main: #020408; --neon-cyan: #00f0ff; --neon-pink: #ff007f; --neon-amber: #ffaa00; --glass-bg: rgba(6, 11, 25, 0.7); --glass-border: rgba(0, 240, 255, 0.15); }
        body { background-color: var(--bg-main); color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; min-height: 100vh; background-attachment: fixed; background-size: cover; background-position: center; }

        header { background: var(--glass-bg); border-bottom: 2px solid rgba(0, 240, 255, 0.25); padding: 10px 20px; position: sticky; top: 0; z-index: 1000; }
        .header-container { max-width: 1300px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo-wrapper { display: flex; align-items: center; } .site-logo-img { height: 40px; }
        
        .sub-nav-container { max-width: 1300px; margin: 20px auto; text-align: center; }
        .sub-nav-bar { display: flex; justify-content: center; gap: 20px; }
        .sub-nav-item { color: #fff; text-decoration: none; font-size: 13px; font-weight: 800; padding: 8px 18px; border-radius: 5px; transition: 0.3s; }
        .sub-nav-item:hover, .sub-nav-item.active { color: var(--neon-cyan); background: rgba(0, 240, 255, 0.1); border: 1px solid rgba(0, 240, 255, 0.2); }

        .main-container { max-width: 1300px; margin: 20px auto; padding: 0 15px; }

        /* 🎀 CENTERED LAYOUT FIX 👇 */
        .drama-details-container {
            display: flex; flex-direction: column; align-items: center; text-align: center; gap: 20px;
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px;
            padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin: 0 auto 30px auto;
            max-width: 900px; 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        /* 🎀 POSTER ZOOM FIX 👇 */
        .detail-poster-wrapper {
            position: relative; border-radius: 12px; overflow: hidden;
            border-left: 4px solid var(--neon-cyan); border-right: 4px solid var(--neon-cyan);
            width: 300px; max-width: 100%; aspect-ratio: 2 / 3; 
            margin: 0 auto; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }
        .detail-poster-img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }

        .details-top-badges-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .genres-row-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
        .genre-tag-badge { background: rgba(157, 78, 221, 0.1); border: 1px solid #9d4edd; color: #d8b4fe; padding: 4px 12px; font-size: 11px; font-weight: 800; border-radius: 20px; }

        .info-spec-list {
            list-style: none; padding: 0; margin: 0 auto 25px auto;
            display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 500px;
        }
        .info-spec-item {
            font-size: 13.5px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center; gap: 10px;
        }
        .info-spec-label { color: var(--neon-cyan); font-weight: bold; text-align: left; }
        .info-spec-value { color: #fff; font-weight: 800; text-align: right; }

        .synopsis-box { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); padding: 20px; border-radius: 10px; line-height: 1.8; color: #ccc; font-size: 13.5px; text-align: center; width: 100%; }

        .download-box { margin-top: 25px; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
        .download-btn { width: 100%; max-width: 280px; height: 48px; display: flex; align-items: center; justify-content: center; background: rgba(0, 85, 255, 0.2); border: 2px solid #0055ff; color: #fff; font-weight: 900; border-radius: 6px; text-decoration: none; transition: 0.3s; gap: 8px; }
        .download-btn:hover { background: #0055ff; box-shadow: 0 0 15px #0055ff; }

        .glass-section-custom { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px; margin: 0 auto 25px auto; max-width: 900px; text-align: center; }
        .glass-section-custom h3 { color: var(--neon-cyan); border-left: 3px solid var(--neon-cyan); padding-left: 10px; text-align: left; margin-bottom: 15px; }

        @media (max-width: 600px) {
            .header-container { flex-direction: row; justify-content: space-between; }
            .site-logo-img { height: 32px; }
            .detail-poster-wrapper { width: 250px; }
            .info-spec-list { max-width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo-wrapper" id="header-logo-container"></a>
        </div>
    </header>

    <div class="sub-nav-container">
        <div class="sub-nav-bar">
            <a href="index.html" class="sub-nav-item"><i class="fa-solid fa-house"></i> Home</a>
            <a href="#" class="sub-nav-item active"><i class="fa-solid fa-film"></i> Episode View</a>
        </div>
    </div>

    <div class="main-container">
        <!-- 🎀 CENTERED DRAMA DETAILS BLOCK -->
        <div class="drama-details-container" id="drama-details-wrapper">
            <p style="color: var(--neon-cyan);">🤖 [SYSTEM RETRIEVING DATA...]</p>
        </div>

        <div class="glass-section-custom" id="download-section-wrapper" style="display:none;"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const dramaId = urlParams.get('drama_id');
        const episodeNum = urlParams.get('ep');

        async function loadEpisodeDetails() {
            try {
                const response = await fetch('data.json?v=' + new Date().getTime());
                if (response.ok) {
                    const db = await response.json();
                    const drama = db.dramas[dramaId];
                    if (drama) {
                        const ep = drama.episodes.find(e => e.episode === episodeNum);
                        if (ep) renderEpisodeDetails(drama, ep);
                    }
                }
            } catch (e) { document.getElementById('drama-details-wrapper').innerHTML = "Error loading data."; }
        }

        function renderEpisodeDetails(drama, ep) {
            document.getElementById('header-logo-container').innerHTML = `<img class="site-logo-img" src="${HEADER_BANNER_LOGO}">`;
            document.title = `${drama.title} - ${ep.episode} | ලියැසි SUBVERSE`;
            document.body.style.backgroundImage = `linear-gradient(to bottom, rgba(2, 4, 8, 0.9), rgba(2, 4, 8, 0.98)), url('${ep.image || drama.image_url}')`;

            const statusColor = drama.status === "COMPLETE" ? "var(--neon-pink)" : "var(--neon-cyan)";

            document.getElementById('drama-details-wrapper').innerHTML = `
                <div class="details-top-badges-row">
                    <span style="background: ${statusColor}; color: #000; padding: 4px 12px; font-weight: bold; border-radius: 4px;">${drama.status}</span>
                    <span style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 4px 12px; border-radius: 4px;">${drama.type}</span>
                </div>

                <div class="detail-poster-wrapper">
                    <img class="detail-poster-img" src="${ep.image || drama.image_url}" alt="Poster">
                </div>
                
                <div class="genres-row-container">
                    ${drama.genres ? drama.genres.map(g => `<span class="genre-tag-badge">${g}</span>`).join('') : ''}
                </div>

                <h1 style="font-size: 26px; font-weight: 900; margin: 10px 0; text-transform: uppercase;">${drama.title}</h1>
                <h2 style="font-size: 18px; color: ${statusColor}; margin: 0 0 20px 0;">${ep.episode}: ${ep.title}</h2>
                
                <ul class="info-spec-list">
                    <li class="info-spec-item"><span class="info-spec-label">Director:</span> <span class="info-spec-value">${ep.director || drama.director || 'N/A'}</span></li>
                    <li class="info-spec-item"><span class="info-spec-label">Writer:</span> <span class="info-spec-value">${ep.writer || drama.writer || 'N/A'}</span></li>
                    <li class="info-spec-item"><span class="info-spec-label">Air Date:</span> <span class="info-spec-value">${ep.first_air_date || drama.first_air_date || 'N/A'}</span></li>
                </ul>

                <div class="synopsis-box">
                    <h3 style="color: ${statusColor}; margin: 0 0 10px 0;">කතා සාරාංශය (Synopsis)</h3>
                    <p style="margin: 0;">${ep.synopsis || drama.synopsis || 'කතා සාරාංශයක් නොමැත.'}</p>
                </div>
            `;

            const dWrapper = document.getElementById('download-section-wrapper');
            dWrapper.style.display = 'block';
            dWrapper.innerHTML = `
                <h3>DOWNLOAD LINKS</h3>
                <div class="download-box">
                    <a class="download-btn" href="${ep.link}" target="_blank">
                        <i class="fa-solid fa-download"></i> GET SUBTITLE
                    </a>
                </div>
            `;
        }

        window.onload = loadEpisodeDetails;
    </script>
</body>
</html>
